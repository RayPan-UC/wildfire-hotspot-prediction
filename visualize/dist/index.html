<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildfire Spread Visualization</title>
  <script type="module" crossorigin src="/assets/main-XP7j3fPS.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/data-kmKsi0D0.js">
  <link rel="stylesheet" crossorigin href="/assets/data-C-FCA7lT.css">
  <link rel="stylesheet" crossorigin href="/assets/main-CuCRB34y.css">
</head>
<body>
  <div id="app">

    <!-- ── Left panel ─────────────────────────────────────────────── -->
    <aside id="panel">
      <header id="panel-header">
        <h1 id="study-name">Loading…</h1>
        <a href="fire_growth.html" id="growth-link" title="Fire growth chart">↗ Growth</a>
      </header>

      <!-- Timeline / playback -->
      <section class="control-group" id="timeline-group">
        <div class="timeline-head">
          <span id="pair-time">—</span>
          <span id="fold-badge" class="badge">—</span>
        </div>
        <input type="range" id="pair-slider" min="0" max="0" value="0" step="1" />
        <div class="timeline-meta">
          <span id="pair-index">0 / 0</span>
          <span id="pair-delta" class="muted">—</span>
        </div>
        <div class="playback">
          <button id="btn-prev"  title="Previous">⏮</button>
          <button id="btn-play"  title="Play / Pause">▶</button>
          <button id="btn-next"  title="Next">⏭</button>
          <select id="speed-select" title="Playback speed">
            <option value="2000">0.5×</option>
            <option value="1000" selected>1×</option>
            <option value="500">2×</option>
            <option value="250">4×</option>
          </select>
        </div>
      </section>

      <!-- Model selector -->
      <section class="control-group">
        <label>Model</label>
        <div class="model-tabs" role="radiogroup">
          <label class="model-tab"><input type="radio" name="model" value="xgb" checked /><span>XGB</span></label>
          <label class="model-tab"><input type="radio" name="model" value="rf"  /><span>RF</span></label>
          <label class="model-tab"><input type="radio" name="model" value="lr"  /><span>LR</span></label>
        </div>
      </section>

      <section class="layer-group">
        <h2>Layers</h2>
        <label class="layer-toggle">
          <input type="checkbox" id="layer-boundary" checked />
          <span class="dot" style="background:#f97316"></span> Fire boundary
        </label>
        <label class="layer-toggle">
          <input type="checkbox" id="layer-selector" checked />
          <span class="dot" style="background:#facc15;opacity:.6"></span> Receptor selector
        </label>
        <label class="layer-toggle">
          <input type="checkbox" id="layer-receptors" checked />
          <span class="dot" style="background:#60a5fa"></span> Receptors (pred)
        </label>
        <label class="layer-toggle">
          <input type="checkbox" id="layer-burned" checked />
          <span class="fire-dot"></span> Actual burn (T2)
        </label>
        <label class="layer-toggle">
          <input type="checkbox" id="layer-sources" checked />
          <span class="dot" style="background:#f97316"></span> Sources A
        </label>
      </section>

      <section class="legend-group">
        <h2>Prediction ramp</h2>
        <div class="prob-ramp">
          <span class="prob-bar"></span>
          <div class="prob-scale">
            <span>0</span><span>0.5</span><span>1</span>
          </div>
        </div>
        <div class="legend-item" style="margin-top:6px">
          <span class="fire-dot"></span> Actual burned at T2
        </div>
        <div class="legend-item">
          <span class="dot" style="background:#9ca3af"></span> Cloud (no label)
        </div>
      </section>

      <section id="pair-stats" class="stats-group" hidden>
        <h2>Pair stats</h2>
        <div id="stats-content"></div>
      </section>

      <section id="cell-info" class="info-group" hidden>
        <h2>Cell info</h2>
        <div id="cell-content"></div>
      </section>
    </aside>

    <!-- ── Map ────────────────────────────────────────────────────── -->
    <main id="map-container">
      <div id="map"></div>
    </main>

  </div>

</body>
</html>
